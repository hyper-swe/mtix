version: 2

project_name: mtix

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: mtix
    main: ./cmd/mtix/
    binary: mtix
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.CommitDate}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{.CommitTimestamp}}"

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
    name_template: "{{.ProjectName}}_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.bundle"
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

release:
  github:
    owner: hyper-swe
    name: mtix
  extra_files:
    - glob: dist/mtix-agent-kit-*.tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
