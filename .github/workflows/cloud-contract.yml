name: cloud-contract

# MTIX-42: the real cloud-Postgres contract gate.
#
# Runs the ACTUAL MTIX_PG_TEST_DSN-gated suites (transport + e2e sync +
# multi-project) against managed Postgres — one provider per shard — and FAILS
# CLOSED on an empty or misconfigured DSN. The previous release gate ran the
# e2e/postgres scaffold with MTIX_TEST_*_DSN, which the real suites do not read,
# so it skipped silently and reported green without ever connecting. This gate
# reads MTIX_PG_TEST_DSN (what the suites actually gate on) and a canary proves
# a live connection before the contract suites run, so a missing secret can
# never masquerade as a pass.
#
# Callable on demand (workflow_dispatch) and as a release gate (workflow_call).
#
# Required repository secrets:
#   MTIX_TEST_NEON_DSN      Neon DIRECT endpoint (no "-pooler"), sslmode=verify-full
#   MTIX_TEST_SUPABASE_DSN  Supabase SESSION pooler (port 5432), sslmode=verify-full
#   MTIX_TEST_SUPABASE_CA   PEM of Supabase's CA chain (private CA; verify-full needs it)

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  cloud-contract:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        provider: [neon, supabase]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"

      - name: Install pg_dump matching the managed servers (MTIX-21)
        # `mtix sync backup` shells out to pg_dump, which refuses to dump a
        # server newer than itself. The managed providers run Postgres 17/18,
        # while ubuntu-22.04 ships the v14 client — so install the PGDG client
        # and point mtix at it. Without this the TestCloudPath backup test skips
        # (version-guarded), which on the cloud gate would be a silent coverage
        # hole for the pg_dump-through-pooler path this ticket exists to cover.
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "MTIX_PG_DUMP=/usr/lib/postgresql/18/bin/pg_dump" >> "$GITHUB_ENV"

      - name: Resolve DSN + CA (fail closed if unset)
        env:
          NEON_DSN: ${{ secrets.MTIX_TEST_NEON_DSN }}
          SUPABASE_DSN: ${{ secrets.MTIX_TEST_SUPABASE_DSN }}
          SUPABASE_CA: ${{ secrets.MTIX_TEST_SUPABASE_CA }}
        run: |
          set -euo pipefail
          case "${{ matrix.provider }}" in
            neon)     DSN="${NEON_DSN}" ;;
            supabase) DSN="${SUPABASE_DSN}" ;;
            *)        echo "::error::unknown provider ${{ matrix.provider }}"; exit 1 ;;
          esac
          if [ -z "${DSN}" ]; then
            echo "::error::MTIX_TEST_${{ matrix.provider }}_DSN is empty — the cloud gate fails closed (MTIX-42); a missing secret must not skip silently."
            exit 1
          fi
          # Supabase serves a private-CA cert. Put the CA IN THE DSN (not only the
          # MTIX_SYNC_SSLROOTCERT env) so BOTH the production path (transport.New /
          # EnforceTLSPosture) AND the raw pgxpool test helpers — which bypass
          # EnforceTLSPosture and therefore never read the env — verify against it.
          # The env is set too, for production-path parity.
          if [ "${{ matrix.provider }}" = "supabase" ]; then
            if [ -z "${SUPABASE_CA}" ]; then
              echo "::error::MTIX_TEST_SUPABASE_CA is empty — Supabase chains to a private CA and verify-full needs it (MTIX-42)."
              exit 1
            fi
            CA_PATH="${RUNNER_TEMP}/supabase-ca.crt"
            printf '%s' "${SUPABASE_CA}" > "${CA_PATH}"
            case "${DSN}" in
              *\?*) DSN="${DSN}&sslrootcert=${CA_PATH}" ;;
              *)    DSN="${DSN}?sslrootcert=${CA_PATH}" ;;
            esac
            echo "MTIX_SYNC_SSLROOTCERT=${CA_PATH}" >> "${GITHUB_ENV}"
          fi
          # Never echo the DSN; write it straight to the job env for later steps.
          echo "MTIX_PG_TEST_DSN=${DSN}" >> "${GITHUB_ENV}"

      - name: Canary — DSN actually connects (guards against a silent skip)
        run: |
          set -euo pipefail
          # This test SKIPS when MTIX_PG_TEST_DSN is unset and PASSES only on a
          # real connection — so a skip here means the DSN is not reaching the
          # suite, i.e. the gate would be a false green.
          out="$(go test ./internal/store/postgres/transport/ -run TestSource_AcceptsTestDSNViaEnv -count=1 -v 2>&1)"
          echo "${out}"
          echo "${out}" | grep -q -- "--- PASS: TestSource_AcceptsTestDSNViaEnv" || {
            echo "::error::cloud DSN canary did not PASS (skipped or failed) — refusing to report a false green (MTIX-42)."
            exit 1
          }

      - name: Transport contract suite (${{ matrix.provider }})
        run: go test ./internal/store/postgres/transport/ -p 1 -count=1 -timeout 20m

      - name: E2E sync suite (${{ matrix.provider }})
        run: go test ./e2e/ -run 'TestE2E|TestSync' -p 1 -count=1 -timeout 20m

      - name: Multi-project sync (${{ matrix.provider }})
        run: go test ./cmd/mtix/ -run TestMultiProject -count=1

      - name: CLI cloud paths — backup / daemon / conflicts / reconcile (${{ matrix.provider }})
        # MTIX-21: the four FR-18 CLI paths that previously had only unit/SQLite
        # coverage, now exercised end-to-end against this provider. -p 1 keeps the
        # cmd/mtix package's shared global app state serialized across tests.
        run: go test ./cmd/mtix/ -run TestCloudPath -p 1 -count=1 -timeout 20m
