name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I need to ... but currently ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
      placeholder: |
        Describe the desired behavior, CLI interface, or API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - REST API
        - gRPC API
        - MCP
        - Web UI
        - SQLite Store
        - Sync / Export / Import
        - Agent Orchestration
        - Documentation
        - Other
    validations:
      required: true
