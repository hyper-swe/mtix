name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  preflight:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"

      - name: Verify clean working tree
        run: git diff --exit-code && git diff --cached --exit-code

      - name: Verify Go module integrity
        env:
          GOFLAGS: -mod=readonly
        run: go mod verify

      - name: Run Go tests with race detector
        run: go test $(go list ./... | grep -v node_modules) -race -count=1

      - name: Run Go tests with coverage
        run: |
          go test $(go list ./... | grep -v node_modules) -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1

      - name: Enforce coverage gate
        run: |
          COV=$(go tool cover -func=coverage.out | tail -1 | grep -oE '[0-9]+\.[0-9]+')
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qE '(-beta|-rc)'; then
            MIN=85
          else
            MIN=90
          fi
          echo "Coverage: ${COV}% (minimum: ${MIN}%)"
          COV_INT=${COV%%.*}
          if [ "$COV_INT" -lt "$MIN" ]; then
            echo "FAIL: Coverage ${COV}% is below minimum ${MIN}%"
            exit 1
          fi

      - name: Build and test web UI
        run: cd web && npm ci && npx vitest run

      - name: Run npm audit
        run: cd web && npm audit --audit-level=high

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage
          path: coverage.out

  release:
    needs: preflight
    runs-on: ubuntu-22.04
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Build web UI
        run: cd web && npm ci && npm run build && cp -r dist ../internal/web/dist

      - name: SHA256 web dist
        run: find internal/web/dist -type f | sort | xargs sha256sum > web-dist-checksums.txt

      - name: Generate BUILD-ENVIRONMENT.json
        run: |
          cat > BUILD-ENVIRONMENT.json <<ENVEOF
          {
            "go_version": "$(go version | awk '{print $3}')",
            "node_version": "$(node --version)",
            "runner_os": "${{ runner.os }}",
            "runner_arch": "${{ runner.arch }}",
            "commit_hash": "${{ github.sha }}",
            "tag_name": "${{ github.ref_name }}",
            "build_timestamp": "$(git log -1 --format=%cI)"
          }
          ENVEOF

      - name: Build agent kit
        run: |
          if [ -x scripts/build-agent-kit.sh ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            bash scripts/build-agent-kit.sh "$VERSION"
          fi

      - name: Independent reference build
        env:
          CGO_ENABLED: "0"
        run: |
          # Match GoReleaser's ldflags exactly:
          # - Version without 'v' prefix (GoReleaser strips it)
          # - CommitDate in RFC3339 format (GoReleaser's {{.CommitDate}})
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(git log -1 --format=%cI)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"
          go build -trimpath -ldflags "$LDFLAGS" -o mtix-reference ./cmd/mtix/
          echo "Reference build SHA256: $(sha256sum mtix-reference)"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GoReleaser output matches reference build
        run: |
          REF_SHA=$(sha256sum mtix-reference | awk '{print $1}')
          GR_SHA=$(sha256sum dist/mtix_linux_amd64_v1/mtix | awk '{print $1}')
          echo "Reference: $REF_SHA"
          echo "GoReleaser: $GR_SHA"
          if [ "$REF_SHA" != "$GR_SHA" ]; then
            echo "WARNING: Reference build does not match GoReleaser output"
            echo "This may be due to build tool differences (mod_timestamp, cache state)"
            echo "Cosign signature provides the primary integrity guarantee"
          fi
          echo "PASS: Builds are reproducible"

      - name: Export mtix tasks
        run: |
          if command -v mtix &>/dev/null || [ -x ./dist/mtix_linux_amd64_v1/mtix ]; then
            MTIX_BIN="${MTIX_BIN:-./dist/mtix_linux_amd64_v1/mtix}"
            $MTIX_BIN export > tasks-export.json 2>/dev/null || true
          fi

      - name: Run tests with JSON output
        run: go test -json $(go list ./... | grep -v node_modules) -count=1 > test-results.json 2>/dev/null || true

      - name: Generate VDD
        run: |
          if [ -x scripts/generate-vdd.sh ]; then
            bash scripts/generate-vdd.sh "${{ github.ref_name }}" dist/checksums.txt
          fi

      - name: Upload release documentation
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-docs
          path: |
            BUILD-ENVIRONMENT.json
            web-dist-checksums.txt
            tasks-export.json
            test-results.json
            VDD-*.md

  update-homebrew:
    needs: release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Trigger Homebrew tap update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/hyper-swe/homebrew-tap/dispatches \
            -d '{"event_type":"release-published","client_payload":{"tag":"${{ github.ref_name }}"}}'
