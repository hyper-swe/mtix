name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-go:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - run: go mod verify
      - run: go test $(go list ./... | grep -v node_modules) -race -count=1

  test-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: cd web && npm ci && npx vitest run

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4

  test-go-postgres-docker:
    # MTIX-14.9: shared contract suite against ephemeral postgres:16-alpine.
    # Hermetic — no external secrets needed. The job auto-skips contract
    # bodies until MTIX-14.1 (the actual PG store driver) lands; until
    # then this stage proves only that the harness compiles, the
    # docker provider can launch a container, and DSN redaction works.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - name: Pre-pull postgres image
        run: docker pull postgres:16-alpine
      - name: Run e2e postgres contract suite (docker provider)
        run: go test ./e2e/postgres/ -tags=e2e -provider=docker -count=1 -timeout=8m

  test-fault-injection:
    # NFR-2.8 conformance (MTIX-26.7): storage must survive disk-full and
    # kill -9 mid-write — either complete safely or fail-stop, never
    # silently corrupt. Runs on EVERY build; a red run here is a
    # durability regression and must never be merged around.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - name: Mount 16 MiB tmpfs fault volume
        run: |
          sudo mkdir -p /mnt/mtix-faultfs
          sudo mount -t tmpfs -o size=16m,mode=1777 tmpfs /mnt/mtix-faultfs
      - name: Run fault-injection suite
        env:
          MTIX_FAULTFS_DIR: /mnt/mtix-faultfs
        run: go test ./e2e/faultinject/ -tags=faultinject -count=1 -timeout=12m -v

  build:
    needs: [test-go, test-web, lint, test-go-postgres-docker, test-fault-injection]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Build web UI
        run: cd web && npm ci && npm run build && cp -r dist ../internal/web/dist
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOFLAGS: -mod=readonly
        run: go build -trimpath -o mtix ./cmd/mtix/
      - name: Verify binary
        run: ./mtix --version
