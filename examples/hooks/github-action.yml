# -----------------------------------------------------------------------------
# mtix snapshot-freshness check — DEFERRED FOR v0.2.0-beta (MTIX-15 / FR-18)
#
# In the v0.1.x design, this workflow regenerated `.mtix/tasks.json` from
# Postgres on a GitHub-hosted runner and failed the build if the committed
# snapshot disagreed. That model assumed Postgres was the canonical store.
#
# v0.2.0-beta ships the FR-18 sync model: the canonical store is each
# developer's LOCAL SQLite; the Postgres hub is an event-sourced
# replication mechanism, not a snapshot source. Server-side validation
# needs a redesign — the GitHub runner doesn't have a local SQLite to
# compare against, only the hub.
#
# Until the v0.2.1 redesign lands, this workflow is a no-op informational
# job. It exits 0 so existing branch protection rules pointing at it do
# not block merges. The job message points operators at the v0.2.0-beta
# alternatives:
#
#   1. Run `mtix sync daemon` as a systemd/launchd service on every
#      developer's machine.
#   2. Install `examples/hooks/pre-push` on every developer's machine.
#   3. Add a CI job that runs `mtix sync doctor --json` against the hub
#      DSN; gate merges via branch protection on that job.
#
# See docs/SECURITY-MODEL.md, docs/SYNC-DESIGN.md, and CHANGELOG.md
# v0.2.0-beta entry. Tracked for v0.2.1.
# -----------------------------------------------------------------------------
name: mtix-snapshot-freshness

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: v0.2.0-beta deferral notice
        run: |
          echo "mtix snapshot-freshness check is deferred to v0.2.1."
          echo "The v0.1.x snapshot-from-PG model does not map to the FR-18 sync architecture."
          echo "v0.2.0-beta alternatives: client-side pre-push hook, mtix sync daemon, or 'mtix sync doctor' in CI."
          echo "See docs/SECURITY-MODEL.md and CHANGELOG.md."
