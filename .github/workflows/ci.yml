name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-go:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - run: go mod verify
      - run: go test $(go list ./... | grep -v node_modules) -race -count=1

  test-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: cd web && npm ci && npx vitest run

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4

  test-go-postgres-docker:
    # MTIX-14.9: shared contract suite against ephemeral postgres:16-alpine.
    # Hermetic — no external secrets needed. The job auto-skips contract
    # bodies until MTIX-14.1 (the actual PG store driver) lands; until
    # then this stage proves only that the harness compiles, the
    # docker provider can launch a container, and DSN redaction works.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Pre-pull postgres image
        run: docker pull postgres:16-alpine
      - name: Run e2e postgres contract suite (docker provider)
        run: go test ./e2e/postgres/ -tags=e2e -provider=docker -count=1 -timeout=8m

  test-fault-injection:
    # NFR-2.8 conformance (MTIX-26.7): storage must survive disk-full and
    # kill -9 mid-write — either complete safely or fail-stop, never
    # silently corrupt. Runs on EVERY build; a red run here is a
    # durability regression and must never be merged around.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Mount 16 MiB tmpfs fault volume
        run: |
          sudo mkdir -p /mnt/mtix-faultfs
          sudo mount -t tmpfs -o size=16m,mode=1777 tmpfs /mnt/mtix-faultfs
      - name: Run fault-injection suite
        env:
          MTIX_FAULTFS_DIR: /mnt/mtix-faultfs
        run: go test ./e2e/faultinject/ -tags=faultinject -count=1 -timeout=12m -v

  test-sync-chaos-postgres:
    # MTIX-30.11: distributed-identity fault-injection + chaos e2e against a
    # real Postgres hub — crash-resumability of RenumberSubtree / the Phase-1
    # dedup SweepDuplicates / the push renumber-drain (ADR-003 §5/§6/§7), and
    # the restore-collision Option B discriminator (ADR-003 §6.1/§15: a
    # cross-epoch re-grant blocks; same-epoch / no-restore near-misses
    # renumber). The whole e2e sync suite is MTIX_PG_TEST_DSN-gated and SKIPS
    # in test-go (no DSN there), so this job is what actually exercises it.
    # Run with -race for the concurrent sweep/renumber coverage. A red run here
    # is an identity/sync regression and must never be merged around.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mtixchaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - name: Run identity/sync chaos + restore e2e suite
        env:
          MTIX_PG_TEST_DSN: postgres://postgres:postgres@127.0.0.1:5432/mtixchaos?sslmode=disable
        run: go test ./e2e/ -race -count=1 -timeout=12m -v

  build:
    needs: [test-go, test-web, lint, test-go-postgres-docker, test-fault-injection, test-sync-chaos-postgres]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Build web UI
        run: cd web && npm ci && npm run build && cp -r dist ../internal/web/dist
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOFLAGS: -mod=readonly
        run: go build -trimpath -o mtix ./cmd/mtix/
      - name: Verify binary
        run: ./mtix --version
